<!DOCTYPE html>
<html>

<head>
  <title>webThing</title>
</head>

<body>
  <h1>webThing</h1>
  <pre id="response">
  </pre>
  <h2>Signup</h2>
  <form action="signup">
    <label for="email">Email</label>
    <input type="text" id="email" name="email">
    <label for="password">Password</label>
    <input type="text" id="password" name="password">
    <button type="button" onclick="convertToJson(this.form, function (a) {document.getElementById('response').innerHTML = a})">Signup</button>
  </form>
  <h2>Register</h2>
  <form action="register">
    <label for="did">did</label>
    <input type="number" id="did" name="did">
    <button type="button" onclick="convertToJson(this.form, function (a) {document.getElementById('response').innerHTML = a})">Register</button>
  </form>
  <h2>Devices</h2>
  <form action="devices">
    <input type="submit">
  </form>
  <h2>Login</h2>
  <form action="login">
    <label for="email">Email</label>
    <input type="text" id="email" name="email">
    <label for="password">Password</label>
    <input type="text" id="password" name="password">
    <button type="button" onclick="convertToJson(this.form, function (a) {document.getElementById('response').innerHTML = a})">Login</button>
  </form>
  <h2>Logout</h2>
  <form action="logout">
    <input type="submit">
  </form>
  <h2>Cmd</h2>
  <form action="cmd">
    <label for="did">did</label>
    <input type="number" id="did" name="did">
    <label for="cmd">cmd</label>
    <input type="text" id="cmd" name="cmd">
    <button type="button" onclick="convertToJson(this.form, function (a) {document.getElementById('response').innerHTML = a})">Execute</button>
  </form>
  <h2>Upload</h2>
  <form action="upload">
    <label for="did">did</label>
    <input type="number" id="did" name="did">
    <label for="data">data</label>
    <input type="text" id="data" name="data">
    <button type="button" onclick="convertToJson(this.form, function (a) {document.getElementById('response').innerHTML = a})">Upload</button>
  </form>
  <h2>Download</h2>
  <form action="download">
    <label for="start">start</label>
    <input type="number" id="start" name="start">
    <label for="end">end</label>
    <input type="number" id="end" name="end">
    <button type="button" onclick="convertToJson(this.form, function (a) {document.getElementById('response').innerHTML = a})">Download</button>
  </form>
  <h2>Update</h2>
  <form action="update">
    <input type="submit">
  </form>
</body>
<script>
  function getJson(url, cbk) {
    let xhr = new XMLHttpRequest();
    xhr.onreadystatechange = function () {
      if (cbk && this.readyState == 4 && this.status == 200) {
        cbk(JSON.parse(this.responseText));
      }
    };
    xhr.open("GET", url, true);
    xhr.send();
  }

  function putJson(url, data) {
    let xhr = new XMLHttpRequest();
    xhr.open("PUT", url, true);
    xhr.setRequestHeader('Content-type', 'application/json');
    xhr.send(JSON.stringify(data));
  }

  function postJson(url, data, cbk) {
    let xhr = new XMLHttpRequest();
    xhr.onreadystatechange = function () {
      if (cbk && this.readyState == 4) {
        try {
          cbk(JSON.parse(this.responseText));
        } catch (e) {
          cbk(this.responseText);
        }
      }
    };
    xhr.open("POST", url, true);
    xhr.setRequestHeader('Content-type', 'application/json');
    xhr.send(JSON.stringify(data));
  }

  function convertToJson(form, cbk) {
    let formData = {};
    for (let i = 0; i < form.elements.length; i++) {
      let element = form.elements[i];
      if (element.type !== "submit" && element.name) {
        if (isNaN(element.value)) {
          formData[element.name] = element.value;
        } else {
          formData[element.name] = Number(element.value);
        }
      }
    }
    postJson(form.action, formData, cbk)
  }
</script>

</html>
